# ──────────────────────────────────────────────────────────────────────────────
# Prometheus scrape configuration — CloudCampus dev stack
# ──────────────────────────────────────────────────────────────────────────────
# Docs: https://prometheus.io/docs/prometheus/latest/configuration/configuration/

global:
  scrape_interval:     15s   # Default scrape interval
  evaluation_interval: 15s   # How often to evaluate alert rules

# ── Alert rules ──────────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/alert_rules.yml

# ── Alertmanager ─────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# ── Scrape targets ────────────────────────────────────────────────────────────
scrape_configs:

  # Self-monitoring: Prometheus scrapes its own metrics
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot backend — /actuator/prometheus (Micrometer)
  # 'host.docker.internal' resolves to the host machine from within Docker.
  - job_name: 'cloudcampus-backend'
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:8080']
    # Label all metrics from this job
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'cloudcampus-backend:8080'
