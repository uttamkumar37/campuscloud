# ──────────────────────────────────────────────────────────────────────────────
# Alert rules for CloudCampus backend (EUP-062 Phase 1)
# ──────────────────────────────────────────────────────────────────────────────
groups:
  - name: cloudcampus_backend
    interval: 30s
    rules:

      # HTTP 5xx error rate > 1 % over 5-minute window
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
            /
            sum(rate(http_server_requests_seconds_count[5m]))
          ) > 0.01
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP 5xx error rate ({{ $value | humanizePercentage }})"
          description: "More than 1% of requests are returning 5xx responses over the last 5 minutes."

      # p95 latency > 2 seconds
      - alert: HighP95Latency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_server_requests_seconds_bucket[5m])) by (le, uri)
          ) > 2
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "p95 latency > 2s on {{ $labels.uri }}"
          description: "The 95th percentile response time has exceeded 2 seconds for the last 2 minutes."

      # HikariCP connection pool near exhaustion (> 90 % of max)
      - alert: ConnectionPoolNearExhaustion
        expr: |
          (
            hikaricp_connections_active
            /
            hikaricp_connections_max
          ) > 0.9
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "HikariCP connection pool > 90 % ({{ $value | humanizePercentage }})"
          description: "The database connection pool is almost full. Investigate slow queries or connection leaks."

      # Backend unreachable (up == 0)
      - alert: BackendDown
        expr: up{job="cloudcampus-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "CloudCampus backend is down"
          description: "Prometheus cannot scrape /actuator/prometheus — the backend may be crashed."

      # JVM heap usage > 85 %
      - alert: JvmHeapHigh
        expr: |
          (
            jvm_memory_used_bytes{area="heap"}
            /
            jvm_memory_max_bytes{area="heap"}
          ) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM heap usage > 85 % ({{ $value | humanizePercentage }})"
          description: "JVM heap is high. Consider increasing -Xmx or investigating a memory leak."

      # JVM heap usage > 95 % — critical, OOM imminent
      - alert: JvmHeapCritical
        expr: |
          (
            jvm_memory_used_bytes{area="heap"}
            /
            jvm_memory_max_bytes{area="heap"}
          ) > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "JVM heap usage > 95 % ({{ $value | humanizePercentage }}) — OOM imminent"
          description: "JVM heap is critically high. An OutOfMemoryError is likely within minutes."

      # Redis down (no scrape data for > 1 min)
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is unreachable"
          description: "Prometheus cannot reach Redis. Rate limiting, session caching, and OTP TTLs are degraded."

      # RabbitMQ queue depth > 1000 messages (notification backlog)
      - alert: RabbitMQQueueDepthHigh
        expr: rabbitmq_queue_messages{queue=~"notification.*"} > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RabbitMQ notification queue depth > 1000 ({{ $value }})"
          description: "The notification queue has a large backlog. Consumer may be stuck or undersized."

      # Backup stale — last successful pg_dump > 8 hours ago
      # cc_backup_last_success_timestamp_seconds is pushed by backup.sh via Pushgateway.
      - alert: BackupNotFresh
        expr: (time() - cc_backup_last_success_timestamp_seconds) > 28800
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL backup is stale ({{ $value | humanizeDuration }} since last success)"
          description: "No successful pg_dump has completed in the last 8 hours. Check the pgbackup container logs and MinIO bucket."

      # Backup metric absent — Pushgateway has never received a push (or was reset)
      # for: 25h gives a brand-new deployment one full backup cycle before alerting.
      - alert: BackupMetricAbsent
        expr: absent(cc_backup_last_success_timestamp_seconds)
        for: 25h
        labels:
          severity: warning
        annotations:
          summary: "Backup success metric is absent — no backup has ever been reported"
          description: "cc_backup_last_success_timestamp_seconds has not been pushed to Pushgateway in 25 hours. The pgbackup container may not be running or PUSHGATEWAY_URL is not configured."

      # Disk usage > 85 % on any mounted volume
      - alert: DiskSpaceHigh
        expr: |
          (
            node_filesystem_size_bytes{fstype!="tmpfs"}
            - node_filesystem_avail_bytes{fstype!="tmpfs"}
          )
          /
          node_filesystem_size_bytes{fstype!="tmpfs"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage > 85 % on {{ $labels.mountpoint }}"
          description: "Disk space on {{ $labels.mountpoint }} is critically low. Clean up or expand volume."

      # AI budget alert — tenant has used at least 90 % of monthly token budget
      # Emitted by AiUsageMetricsPublisher as cloudcampus_ai_budget_utilization_percent.
      - alert: AIBudgetBurnRateHigh
        expr: cloudcampus_ai_budget_utilization_percent >= 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "AI budget burn is high for tenant {{ $labels.tenant_code }}"
          description: "Tenant {{ $labels.tenant_code }} has used {{ $value | humanize }}% of its configured monthly AI token budget. Review AI usage dashboard and tenant budget configuration."

      # AI usage anomaly alert — tenant AI request failure rate is elevated
      # Emitted by AiUsageMetricsPublisher as cloudcampus_ai_request_failure_rate_percent.
      - alert: AIUsageFailureRateHigh
        expr: cloudcampus_ai_request_failure_rate_percent >= 25
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "AI usage anomaly for tenant {{ $labels.tenant_code }}"
          description: "Tenant {{ $labels.tenant_code }} has an AI request failure rate of {{ $value | humanize }}% this month. Check provider errors, prompt failures, and budget enforcement events."
