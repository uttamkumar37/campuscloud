# ──────────────────────────────────────────────────────────────────────────
# CloudCampus — Nginx reverse proxy / TLS termination (CRIT-08)
# ──────────────────────────────────────────────────────────────────────────
# Dev: uses self-signed cert generated by gen-certs.sh
# Prod: replace cert/key paths with real TLS certificate (Let's Encrypt or ACM)
# ──────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Hide nginx version ────────────────────────────────────────────────
    server_tokens off;

    # ── Logging ───────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Rate limiting zones ───────────────────────────────────────────────
    # General API: 60 req/min per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    # Auth endpoints: 10 req/min per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # ── TLS settings ──────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    # OCSP stapling (enable in prod with real cert)
    # ssl_stapling              on;
    # ssl_stapling_verify       on;

    # ── Security headers (applied to all responses) ───────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                  always;
    add_header X-Content-Type-Options    "nosniff"                     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection          "1; mode=block"               always;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ─────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # HSTS — 1 year, include subdomains (enable only when cert is trusted)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Content Security Policy ───────────────────────────────────────
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none';"
            always;

        # Client body size limit (5 MB)
        client_max_body_size 5m;

        # ── Backend API proxy ─────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://host.docker.internal:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_read_timeout  30s;
            proxy_send_timeout  30s;
            proxy_connect_timeout 5s;
        }

        # ── Auth endpoints — stricter rate limit ──────────────────────────
        location ~ ^/api/v1/(auth|password-reset)/ {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass         http://host.docker.internal:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── Actuator — block external access entirely ─────────────────────
        location /actuator {
            return 403;
        }

        # ── Frontend (dev: Vite dev server) ───────────────────────────────
        location / {
            proxy_pass         http://host.docker.internal:5173;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }

        # ── Health check endpoint (no rate limit, no auth) ────────────────
        location = /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
