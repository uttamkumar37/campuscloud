server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    # H-18: 24h retention means traces from the previous day are gone by the time
    # an incident is investigated the next morning. 168h (7 days) covers a full
    # on-call rotation and allows correlation with weekly Grafana dashboards.
    block_retention: 168h

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces

metrics_generator:
  registry:
    external_labels:
      source: cloudcampus
      cluster: local

overrides:
  defaults:
    metrics_generator:
      processors: []
