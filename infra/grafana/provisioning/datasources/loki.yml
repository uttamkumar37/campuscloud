apiVersion: 1

datasources:
  - name:   Loki
    type:   loki
    access: proxy
    url:    http://loki:3100
    isDefault: false
    jsonData:
      maxLines: 1000
      derivedFields:
        # Link Loki trace IDs directly to Tempo spans
        - name:          TraceID
          matcherRegex:  '"traceId":"([a-f0-9]+)"'
          url:           '$${__value.raw}'
          datasourceUid: tempo
