

# ──────────────────────────────────────────────────────────────────────────
# CloudCampus — Local Development Infrastructure
# ──────────────────────────────────────────────────────────────────────────
# Usage:
#   cp .env.example .env && $EDITOR .env   # fill in secrets first
#   docker compose up -d                   # start all services
#   docker compose down                    # stop (data persists in volumes)
#   docker compose down -v                 # stop + DELETE all data (full reset)
#
# Then run the backend with dev profile:
#   JWT_SECRET='...' BOOTSTRAP_ADMIN_PASSWORD='...' mvn spring-boot:run
#
# Services (all bound to 127.0.0.1 — NOT externally accessible):
#   postgres    → 127.0.0.1:5432   (cloudcampus / ${POSTGRES_PASSWORD})
#   redis       → 127.0.0.1:6379   (password-protected)
#   minio       → 127.0.0.1:9000 (API) + 127.0.0.1:9001 (Console)
#   mailhog     → 127.0.0.1:8025 (Web UI) — captures all outbound emails in dev
#   rabbitmq    → 127.0.0.1:5672 (AMQP) + 127.0.0.1:15672 (management UI)
#   prometheus  → 127.0.0.1:9090 — scrapes /actuator/prometheus
#   grafana     → 127.0.0.1:3100 — pre-provisioned dashboard
#   tempo       → 127.0.0.1:3200 (query API) + 127.0.0.1:4318 (OTLP HTTP)
#   alertmanager→ 127.0.0.1:9093

# L-27: log rotation applied to every service — prevents unbounded disk fill
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── Nginx (TLS termination + reverse proxy) ────────────────────────────
  # Run: infra/nginx/gen-certs.sh to create self-signed dev certs first.
  # Production: replace infra/nginx/certs/ with real cert + key files.
  nginx:
    image: nginx:1.27-alpine
    container_name: cloudcampus-nginx
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cloudcampus-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cloudcampus}
      POSTGRES_USER: ${POSTGRES_USER:-cloudcampus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cloudcampus} -d ${POSTGRES_DB:-cloudcampus}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M
        reservations:
          cpus: "0.5"
          memory: 256M

  # ── Redis 7 ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cloudcampus-redis
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ── MinIO (S3-compatible object storage) ───────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: cloudcampus-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  # ── MailHog (SMTP catcher) ─────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: cloudcampus-mailhog
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

  # ── Prometheus ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: cloudcampus-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  # ── Alertmanager ───────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: cloudcampus-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

  # ── Grafana ────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.3
    container_name: cloudcampus-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: "3000"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/cloudcampus-backend.json"
    ports:
      - "127.0.0.1:3100:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - tempo
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ── Tempo (OpenTelemetry traces) ───────────────────────────────────────
  tempo:
    image: grafana/tempo:2.5.0
    container_name: cloudcampus-tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    ports:
      - "127.0.0.1:3200:3200"
      - "127.0.0.1:4318:4318"
    volumes:
      - ./infra/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M

  # ── pg_dump backup sidecar ─────────────────────────────────────────────
  pgbackup:
    build:
      context: ./infra/pgbackup
      dockerfile: Dockerfile
    container_name: cloudcampus-pgbackup
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: ${POSTGRES_DB:-cloudcampus}
      PG_USER: ${POSTGRES_USER:-cloudcampus}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-cloudcampus-backups}
      RETENTION_DAYS: ${RETENTION_DAYS:-30}
      BACKUP_PASSPHRASE: ${BACKUP_PASSPHRASE}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 32M

  # ── Loki (log aggregation) ────────────────────────────────────────────
  # M-15: Structured JSON logs from all containers are shipped here via Promtail
  # and queryable in Grafana alongside traces (Tempo) and metrics (Prometheus).
  loki:
    image: grafana/loki:2.9.8
    container_name: cloudcampus-loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "127.0.0.1:3110:3100"
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ── Promtail (log shipper) ────────────────────────────────────────────
  # Tails Docker container logs via the Docker socket, parses JSON fields
  # (level, traceId, tenantId), and forwards to Loki.
  promtail:
    image: grafana/promtail:2.9.8
    container_name: cloudcampus-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

  # ── RabbitMQ 3 ────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: cloudcampus-rabbitmq
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-cloudcampus}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
  rabbitmq_data:
  tempo_data:
  alertmanager_data:
  loki_data:
