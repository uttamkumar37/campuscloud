# Test profile — uses Testcontainers PostgreSQL (real DB, not H2).
# Spring Boot 3.1+ with @ServiceConnection auto-wires the DataSource URL from the container.
# Redis is provided by a Testcontainers Redis container (also @ServiceConnection).
# Flyway runs all migrations so schema is always up to date.

spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  flyway:
    enabled: true

  # Async executor — keep it small for tests
  task:
    execution:
      pool:
        core-size: 1
        max-size: 2
        queue-capacity: 10

  # Mail — no-op SMTP; satisfies JavaMailSender autowiring without sending real email.
  mail:
    host: localhost
    port: 25
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
            required: false

spring:
  # Disable RabbitMQ auto-configuration in tests — no broker available.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

app:
  retention:
    soft-delete-retention-days: 1

  encryption:
    secret: "test-encryption-secret-for-integration-tests-only-do-not-use-in-production"

  jwt:
    secret: "test-secret-key-for-integration-tests-only-do-not-use-in-production-must-be-long-enough"
    expiration-ms: 3600000

  otp:
    ttl-seconds: 300
    length: 6
    from-email: noreply@cloudcampus.io

  rate-limit:
    login:
      max-attempts-per-ip: 20
      window-seconds-per-ip: 300
      max-attempts-per-username: 10
      window-seconds-per-username: 900
      lockout-threshold: 10
      lockout-window-seconds: 3600
    api:
      per-user-requests: 20
      per-user-window-seconds: 60
      per-tenant-requests: 60
      per-tenant-window-seconds: 60

logging:
  level:
    org.hibernate.SQL: WARN
    com.cloudcampus: INFO
