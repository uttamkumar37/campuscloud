# ── DEV profile ───────────────────────────────────────────────────────────
# Uses the Docker Compose PostgreSQL instance (localhost:5432).
# Start local services first: docker compose up -d
# Connection details match docker-compose.yml (POSTGRES_USER / POSTGRES_PASSWORD).

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/cloudcampus
    driver-class-name: org.postgresql.Driver
    username: cloudcampus
    password: cloudcampus_dev

    # C-20: Simulate realistic pool pressure even in dev.
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 3000
      idle-timeout: 300000
      max-lifetime: 1200000
      pool-name: cloudcampus-dev-pool

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    out-of-order: true

  # RabbitMQ — Docker Compose instance (CC-1504)
  rabbitmq:
    host: localhost
    port: 5672
    username: cloudcampus
    password: cloudcampus_dev

  # Redis — connect to local Docker Redis
  data:
    redis:
      host: localhost
      port: 6379
      password: cloudcampus_dev
      connect-timeout: 1s
      timeout: 500ms

  # ── Mail — MailHog SMTP catcher ───────────────────────────────────────
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
            required: false

  # ── AI — disable real providers in dev (mock beans handle all calls) ──
  ai:
    anthropic:
      api-key: dev-placeholder
      chat:
        enabled: false
    openai:
      api-key: dev-placeholder
      embedding:
        enabled: false

# ── Application Config ───────────────────────────────────────────────────
app:
  encryption:
    secret: "dev-aes-key-for-local-only-do-not-use-in-production-32+"

  retention:
    soft-delete-retention-days: 90

  bootstrap:
    admin:
      username: superadmin
      password: admin123

  minio:
    endpoint: http://localhost:9000
    access-key: minioaccesskey123456
    secret-key: miniosecretkey123456789012345678
    bucket: cloudcampus-documents

  razorpay:
    key-id: rzp_test_dev_placeholder
    key-secret: dev_secret_placeholder
    enabled: false

  ai:
    enabled: false   # mock mode — set to true + real API keys for live AI

  demo:
    enabled: true    # seeds Greenwood International School on startup (DemoDataSeeder)

# ── OpenAPI / Swagger UI — enabled in dev only ──────────────────────────
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
