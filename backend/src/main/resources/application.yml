server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: cloudcampus-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cloudcampus}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  tenant:
    header-name: X-Tenant-ID
    default-schema: public
    subdomain:
      enabled: ${APP_TENANT_SUBDOMAIN_ENABLED:true}
      root-domains: ${APP_TENANT_ROOT_DOMAINS:localhost}
      reserved-labels: ${APP_TENANT_RESERVED_LABELS:www,app,api,admin,super-admin}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  cookie:
    secure: ${APP_COOKIE_SECURE:false}
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:3600000}
    bootstrap-admin:
      username: ${BOOTSTRAP_ADMIN_USERNAME:superadmin}
      password: ${BOOTSTRAP_ADMIN_PASSWORD}
      role: ${BOOTSTRAP_ADMIN_ROLE:SUPER_ADMIN}
razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}