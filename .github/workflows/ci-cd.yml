name: CloudCampus CI/CD

# ⚠️  CI/CD disabled for local development — trigger manually from GitHub Actions tab
# To re-enable for production: restore `push: branches: [main]` below
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: cloudcampus-backend
  IMAGE_TAG: latest
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/cloudcampus-backend:latest

jobs:
  build:
    name: Build And Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: cloudcampus
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cloudcampus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DB_URL: jdbc:postgresql://localhost:5432/cloudcampus
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: 0123456789abcdef0123456789abcdef
      JWT_ACCESS_TOKEN_EXPIRATION_MS: 3600000
      BOOTSTRAP_ADMIN_USERNAME: superadmin
      BOOTSTRAP_ADMIN_PASSWORD: admin12345
      BOOTSTRAP_ADMIN_ROLE: SUPER_ADMIN
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build With Maven
        run: mvn -B -ntp clean package

  docker:
    name: Build And Push Docker Image
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log In To Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build And Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest
    needs: docker
    environment:
      name: production

    steps:
      - name: Deploy Latest Backend Container
        uses: appleboy/ssh-action@v1.0.3
        env:
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          envs: BACKEND_IMAGE,DOCKER_USERNAME,DOCKER_PASSWORD
          script: |
            set -eu

            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
            docker pull "$BACKEND_IMAGE"

            docker stop cloudcampus-backend || true
            docker rm cloudcampus-backend || true

            docker run -d \
              --name cloudcampus-backend \
              --restart unless-stopped \
              --env-file /opt/cloudcampus/backend.env \
              -p 8080:8080 \
              "$BACKEND_IMAGE"

            docker image prune -f
