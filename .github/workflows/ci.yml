name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cloudcampus-backend

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1 — Backend: compile, test (Testcontainers), package
  # ──────────────────────────────────────────────────────────────
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up JDK 21
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build and run tests
        working-directory: backend
        run: mvn verify --batch-mode --no-transfer-progress

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Job 2 — Frontend: TypeScript + Vite production build
  # ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — TypeScript & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check + Vite build
        working-directory: frontend
        run: npm run build

  # ──────────────────────────────────────────────────────────────
  # Job 3 — Mobile: TypeScript check (Expo / React Native)
  # ──────────────────────────────────────────────────────────────
  mobile:
    name: Mobile — TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: TypeScript check
        working-directory: mobile
        run: npx tsc --noEmit

  # ──────────────────────────────────────────────────────────────
  # Job 4 — Secret scan: TruffleHog (H-21)
  #   Scans for verified secrets on every push and PR.
  # ──────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan — TruffleHog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for diff scan)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: TruffleHog — scan commits in this push/PR
        run: |
          # Determine the base commit to diff from.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          # Fall back to scanning just HEAD if BASE is unavailable (first push).
          [ -z "$BASE" ] && BASE="HEAD~1"
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/pwd" \
            ghcr.io/trufflesecurity/trufflehog:3.90.2 \
            git file:///pwd \
            --since-commit "$BASE" \
            --only-verified \
            --fail

  # ──────────────────────────────────────────────────────────────
  # Job 5 — Dependency CVE scan: OWASP Dependency-Check (H-21)
  #   Fails the build on any dependency with CVSS >= 7 (HIGH).
  # ──────────────────────────────────────────────────────────────
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up JDK 21
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: OWASP dependency-check (fail on CVSS >= 7)
        working-directory: backend
        run: |
          mvn org.owasp:dependency-check-maven:10.0.4:check \
            -DfailBuildOnCVSS=7 \
            -DsuppressionsFile=.owasp-suppressions.xml \
            --batch-mode --no-transfer-progress
        # This step intentionally fails the workflow on HIGH+ CVEs. If the NVD
        # feed rate-limits CI, fix the feed/API-key configuration instead of
        # bypassing the security gate.

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: owasp-dependency-check-report
          path: backend/target/dependency-check-report.html
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # Job 6 — Docker: build image and push to GHCR
  #   Only runs on pushes to main (not on PRs), after all jobs pass
  # ──────────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend, frontend, mobile, secret-scan, dependency-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up JDK 21
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Package JAR (skip tests — already ran in backend job)
        working-directory: backend
        run: mvn package -DskipTests --batch-mode --no-transfer-progress

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=true

      - name: Build and push image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # H-21: Trivy container scan — fails the run on HIGH/CRITICAL CVEs.
      # Runs after push so the image digest is available; alerts the team
      # even though the image is already in GHCR (use branch protection to
      # block deploys until the scan passes).
      - name: Trivy container scan
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -e TRIVY_USERNAME=${{ github.actor }} \
            -e TRIVY_PASSWORD=${{ secrets.GITHUB_TOKEN }} \
            aquasec/trivy:0.61.0 image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            "$IMAGE"
